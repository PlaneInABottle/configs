# Optional Expo development-client overlay handling.
# Use only after inspection confirms these exact labels for the current app.
appId: ${MAESTRO_APP_ID}
---
- runFlow:
    when:
      visible: "DEVELOPMENT SERVERS"
    commands:
      - tapOn: ${METRO_URL}
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
