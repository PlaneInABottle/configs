# Set zsh as default shell
set -g allow-passthrough on
set -g default-shell $SHELL

# Optional: Set window title to show current directory
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Mark the outer terminal title so Kitty can apply tmux-specific key behavior.
set -g set-titles on
set -g set-titles-string 'tmux:#{session_name}'

# Enable vim-style navigation in copy mode
set -g mode-keys vi
set -s extended-keys on

# Make Shift+PageUp/Shift+PageDown and the mouse wheel behave like Kitty scrollback inside tmux.
set -g mouse on
set -g history-limit 100000
bind -n S-PPage copy-mode -u
bind -T copy-mode-vi S-PPage send-keys -X page-up
bind -T copy-mode-vi S-NPage send-keys -X page-down
bind -T copy-mode S-PPage send-keys -X page-up
bind -T copy-mode S-NPage send-keys -X page-down




# Reload config shortcut
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"
